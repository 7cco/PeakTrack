services:
  nginx:
    build:
      context: ./docker/nginx
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "8000:8000"
    volumes:
      - ./laravel:/var/www/laravel
    depends_on:
      - laravel_app

  laravel_app:
    build:
      context: ./laravel
    container_name: laravel_app
    volumes:
      - ./laravel:/var/www/laravel
      - storage:/var/www/html/storage 
    user: "1000:1000"
    entrypoint: /var/www/laravel/docker-entrypoint.sh
    command: php-fpm
    depends_on: 
      mysql: 
        condition: service_healthy 

  mysql: 
    image: mysql:8
    environment: 
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} 
      MYSQL_USER: ${DB_USER} 
      MYSQL_PASSWORD: ${DB_PASSWORD} 
    container_name: mysql
    volumes: 
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql 
    healthcheck: 
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"] 
      interval: 5s 
      retries: 10 

  fastapi:
    build:
      context: ./fastapi
    container_name: fastapi
    volumes:
      - ./fastapi:/app # Монтируем код для быстрой разработки

  vite:
    image: node:20-alpine
    working_dir: /var/www/laravel
    volumes:
      - ./laravel:/var/www/laravel # Для Vite маппинг оставляем, если он нужен на сервере
      - node_modules:/var/www/laravel/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - laravel_app

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql

volumes:
  node_modules:
    driver: local
  storage: